<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Netlify Trigger</title>
</head>
<body>
    <form name="kontakt" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="kontakt" />
        <input name="bot-field" />
        <input type="text" name="meno" />
        <input type="email" name="email" />
        <input type="text" name="firma" />
        <select name="rozpocet"></select>
        <select name="termin"></select>
        <select name="typ-webu"></select>
        <textarea name="sprava"></textarea>
        <button type="submit">Odoslať</button>
    </form>
</body>
</html>
